name: Telegram notify
description: >
  Sends a plain-text message to a Telegram chat. Skips silently when the
  token/chat-id secrets are unset, so callers never fail on a missing secret.

inputs:
  token:
    description: Telegram bot token (pass secrets.TELEGRAM_BOT_TOKEN)
    required: false
  chat-id:
    description: Telegram chat id (pass secrets.TELEGRAM_CHAT_ID)
    required: false
  message:
    description: Message text (sent as plain text; truncated to the API limit)
    required: true

runs:
  using: composite
  steps:
    - shell: bash
      # Inputs flow through env, never string-interpolated into the script —
      # the message embeds upstream-controlled spec text.
      env:
        TOKEN: ${{ inputs.token }}
        CHAT_ID: ${{ inputs.chat-id }}
        MESSAGE: ${{ inputs.message }}
      run: |
        if [ -z "$TOKEN" ] || [ -z "$CHAT_ID" ]; then
          echo "Telegram secrets not configured — skipping notification."
          exit 0
        fi
        # head -c cuts on a byte boundary and can leave a dangling partial
        # UTF-8 sequence (spec text is non-ASCII); iconv -c drops it so the
        # text field stays valid UTF-8. 4000 < Telegram's 4096-char limit.
        response=$(printf '%s' "$MESSAGE" | head -c 4000 | iconv -f UTF-8 -t UTF-8 -c | curl -sS -X POST \
          "https://api.telegram.org/bot$TOKEN/sendMessage" \
          -d "chat_id=$CHAT_ID" \
          -d "disable_web_page_preview=true" \
          --data-urlencode "text@-")
        echo "$response" | grep -q '"ok":true' || { echo "::warning::Telegram send failed: $response"; }
