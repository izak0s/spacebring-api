name: Auto release

# When the nightly spec-regen PR is merged, bump the minor version and push the
# tag. The tag push triggers publish.yml (on: push tags 'v*'), which runs CI and
# publishes to npm. No other PRs trigger this — only the bot branch below.
on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  bump:
    # head.repo check: only the bot branch in THIS repo can trigger a release —
    # a fork PR whose branch happens to be named auto/spec-update cannot.
    if: >
      github.event.pull_request.merged == true &&
      github.event.pull_request.head.ref == 'auto/spec-update' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: main
          fetch-depth: 0
          # Default GITHUB_TOKEN pushes don't trigger workflows; RELEASE_TOKEN
          # (PAT with contents write) makes the tag push start publish.yml.
          token: ${{ secrets.RELEASE_TOKEN }}

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 24.x
          cache: npm
      - run: npm ci --ignore-scripts

      - name: Configure git
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

      # Bump major only for a consumer-breaking change. "Breaking" is decided by
      # the same classifier that gates auto-merge (codegen/classify-surface.ts),
      # run over the full typed-surface snapshot — so a removed/renamed method
      # OR a changed signature / new required query param bumps major, and pure
      # additions stay minor. Keying off surface.test.ts.snap here would miss
      # signature changes: that snapshot records method names only, not types.
      - name: Decide version bump from the API-surface diff
        id: bump
        run: |
          git show HEAD^:tests/__snapshots__/typed-surface.txt > /tmp/old-typed-surface.txt
          verdict=$(npx tsx codegen/classify-surface.ts /tmp/old-typed-surface.txt tests/__snapshots__/typed-surface.txt)
          if [ "$verdict" = "breaking" ]; then
            echo "level=major" >> "$GITHUB_OUTPUT"
            echo "::warning::Breaking public API change (removed/renamed method, changed signature, or new required param) — bumping MAJOR."
          else
            echo "level=minor" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version and push tag
        run: |
          npm version ${{ steps.bump.outputs.level }} -m ':rocket: Publish OpenAPI spec update (%s)'
          git push --follow-tags origin main
