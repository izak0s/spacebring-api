name: Publish

on:
  push:
    tags: ['v*']

permissions:
  contents: write # create the GitHub release
  id-token: write # npm trusted publishing (OIDC) + provenance

jobs:
  # Full CI (generate-sync check, typecheck, tests across the Node matrix,
  # build, pack check). Gates the release: publish does not run unless this passes.
  ci:
    uses: ./.github/workflows/ci.yml

  publish:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # release notes diff against the previous v* tag
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm
          registry-url: https://registry.npmjs.org

      # Trusted publishing needs npm >= 11.5.1 (Node 24 image already satisfies this).

      # --ignore-scripts blocks dependency install scripts (supply chain);
      # our own prepublishOnly still runs at `npm publish` below.
      - run: npm ci --ignore-scripts

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "v$PKG_VERSION" != "$GITHUB_REF_NAME" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version v$PKG_VERSION. Use 'npm version' to release."
            exit 1
          fi

      # No token: authenticated via OIDC trusted publishing. Configure it on
      # npmjs.com after the first (manual) publish: package settings ->
      # Publishing access -> link this repo + publish.yml. Provenance is
      # attached automatically once the repo is public.
      - run: npm publish --access public

      # Prepend a human-readable API diff (same generator as the regen PR
      # body) to the auto-generated notes, so the release tab answers "what
      # changed for me" without reading generated-code diffs.
      - name: Build API-changes section
        id: notes
        run: |
          prev=$(git tag --list 'v*' --sort=-v:refname | grep -vx "$GITHUB_REF_NAME" | head -1)
          notes_file=""
          if [ -n "$prev" ] && git show "$prev:spec/openapi.json" > /tmp/prev-spec.json 2>/dev/null; then
            args="/tmp/prev-spec.json spec/openapi.json"
            if git show "$prev:tests/__snapshots__/surface.test.ts.snap" > /tmp/prev-surface.snap 2>/dev/null; then
              args="$args /tmp/prev-surface.snap tests/__snapshots__/surface.test.ts.snap"
            fi
            {
              echo "## API changes since $prev"
              echo ""
              if cmp -s /tmp/prev-spec.json spec/openapi.json; then
                echo "_None — internal/tooling release._"
              else
                npx tsx codegen/diff-spec.ts $args
              fi
              echo ""
            } > /tmp/release-notes.md
            notes_file="/tmp/release-notes.md"
          fi
          echo "file=$notes_file" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        run: |
          if [ -n "${{ steps.notes.outputs.file }}" ]; then
            gh release create "$GITHUB_REF_NAME" --generate-notes --notes-file "${{ steps.notes.outputs.file }}"
          else
            gh release create "$GITHUB_REF_NAME" --generate-notes
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Read API-changes section for the notification
        id: tgnotes
        run: |
          {
            echo 'body<<TG_EOF'
            if [ -n "${{ steps.notes.outputs.file }}" ]; then cat "${{ steps.notes.outputs.file }}"; fi
            echo 'TG_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Telegram — released
        uses: ./.github/actions/telegram
        with:
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          chat-id: ${{ secrets.TELEGRAM_CHAT_ID }}
          message: |
            🚀 ${{ github.repository }} ${{ github.ref_name }} published to npm
            https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}

            ${{ steps.tgnotes.outputs.body }}
