version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    # One PR for all dev deps — full CI (regen drift, typecheck, tests, build,
    # pack) gates it, so a toolchain break surfaces in the PR, not locally.
    groups:
      dev-dependencies:
        patterns:
          - "*"
    ignore:
      # TS 6/7 break the toolchain: openapi-typescript's peer range rejects
      # them (npm ci ERESOLVE), and TS 7 (native compiler) additionally drops
      # the in-process JS API that openapi-typescript and tsup's dts build
      # depend on. Unpin once openapi-typescript + tsup support them.
      # Verified broken 2026-07-10.
      - dependency-name: typescript
        versions: [">=6.0.0"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
