name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call: # let publish.yml gate releases on a full CI run

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x, 24.x]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      # --ignore-scripts: no dep needs install scripts (esbuild's binary comes
      # via optionalDependencies), and it keeps a compromised dependency's
      # install script from executing in CI.
      - run: npm ci --ignore-scripts

      - name: Generated code is in sync with the committed spec
        run: |
          npm run generate
          git diff --exit-code

      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build

      - name: Verify package contents
        run: npm run pack:dry-run

  # The published d.ts must stay consumable by the oldest TypeScript we
  # support — new compiler versions can emit declaration syntax older ones
  # can't parse. Installs the packed tarball into a scratch project pinned to
  # the floor TS version and typechecks a small consumer with skipLibCheck off.
  consumer-types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 24.x
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run build

      # Floor is 5.4: the inlined openapi-fetch types need TS ≥ 5.4 inference.
      - name: Compile consumer against dist with TypeScript 5.4
        run: |
          tarball="$PWD/$(npm pack --silent)"
          mkdir /tmp/consumer && cd /tmp/consumer
          npm init -y > /dev/null
          npm install --ignore-scripts --no-audit --no-fund "$tarball" typescript@5.4 @types/node@20 > /dev/null
          cat > tsconfig.json << 'EOF'
          {
            "compilerOptions": {
              "strict": true,
              "noEmit": true,
              "target": "es2022",
              "module": "node16",
              "moduleResolution": "node16",
              "skipLibCheck": false
            }
          }
          EOF
          cat > check.ts << 'EOF'
          import {
            Spacebring,
            SpacebringError,
            type Booking,
            type GetBookingsQuery,
            type Invoice,
          } from "@izak0s/spacebring-api";

          const sb = new Spacebring({ clientId: "id", clientSecret: "secret", timeoutMs: 5_000 });

          export async function checkSurface(locationRef: string): Promise<void> {
            const query: GetBookingsQuery = { locationRef, limit: 10 };
            const { bookings, nextPageToken } = await sb.resources.bookings.list(query);
            const pages: Booking[] = bookings ?? [];
            void nextPageToken;
            for await (const booking of sb.resources.bookings.iterate({ locationRef })) {
              pages.push(booking);
            }
            const invoice: Invoice = await sb.billing.invoices.get("00000000-0000-0000-0000-000000000000");
            void invoice;
            try {
              await sb.locations.list();
            } catch (error) {
              if (error instanceof SpacebringError) void error.status;
            }
          }
          EOF
          ./node_modules/.bin/tsc -p tsconfig.json
          echo "d.ts compiles under $(./node_modules/.bin/tsc --version)"
