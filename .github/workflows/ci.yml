name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call: # let publish.yml gate releases on a full CI run

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x, 24.x]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci

      - name: Generated code is in sync with the committed spec
        run: |
          npm run generate
          git diff --exit-code

      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      - name: Verify package contents
        run: npm run pack:dry-run
